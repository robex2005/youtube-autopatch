name: Patch YouTube with Morphe

on:
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if versions unchanged'
        type: boolean
        default: false
      safe_mode:
        description: 'Diagnostic: build with ONLY the microG patch (no other patches) to isolate launch crashes'
        type: boolean
        default: false
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: write

env:
  YT_PACKAGE: com.google.android.youtube
  ARCH: arm64-v8a

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Get latest tool versions
        id: versions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CLI_TAG=$(curl -sf -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/MorpheApp/morphe-cli/releases/latest" | jq -r '.tag_name')
          PATCHES_TAG=$(curl -sf -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/MorpheApp/morphe-patches/releases/latest" | jq -r '.tag_name')
          MICROG_TAG=$(curl -sf -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/MorpheApp/MicroG-RE/releases/latest" | jq -r '.tag_name')
          echo "cli_tag=$CLI_TAG"         >> "$GITHUB_OUTPUT"
          echo "patches_tag=$PATCHES_TAG" >> "$GITHUB_OUTPUT"
          echo "microg_tag=$MICROG_TAG"   >> "$GITHUB_OUTPUT"
          echo "morphe-cli: $CLI_TAG | morphe-patches: $PATCHES_TAG | MicroG-RE: $MICROG_TAG"

      - name: Restore build cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: .build-cache
          key: yt-morphe-${{ steps.versions.outputs.cli_tag }}-${{ steps.versions.outputs.patches_tag }}

      - name: Decide whether to build
        id: gate
        run: |
          if [ "${{ steps.cache.outputs.cache-hit }}" = "true" ] \
          && [ "${{ github.event.inputs.force_rebuild }}" != "true" ]; then
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "Already built — skipping."
          else
            echo "build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download morphe-cli JAR
        if: steps.gate.outputs.build == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          URL=$(curl -sf -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/MorpheApp/morphe-cli/releases/latest" \
            | jq -r '.assets[] | select(.name | endswith(".jar")) | .browser_download_url' | head -1)
          curl -fSL -o morphe-cli.jar "$URL"
          ls -lh morphe-cli.jar

      - name: Download morphe-patches bundle
        if: steps.gate.outputs.build == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE=$(curl -sf -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/MorpheApp/morphe-patches/releases/latest")
          URL=$(echo "$RELEASE" | jq -r \
            '.assets[] | select(.name | test("\\.(zip|tar\\.gz)$") | not) | .browser_download_url' | head -1)
          NAME=$(echo "$RELEASE" | jq -r \
            '.assets[] | select(.name | test("\\.(zip|tar\\.gz)$") | not) | .name' | head -1)
          curl -fSL -o "$NAME" "$URL"
          echo "PATCHES_FILE=$NAME" >> "$GITHUB_ENV"
          ls -lh "$NAME"

      - name: Download MicroG-RE
        if: steps.gate.outputs.build == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE=$(curl -sf -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/MorpheApp/MicroG-RE/releases/latest")
          # Pick the real app APK: largest .apk asset that isn't a debug build.
          # head -1 previously could grab a debug/variant APK that won't open.
          PICK=$(echo "$RELEASE" | jq -r '
            [.assets[]
              | select(.name | endswith(".apk"))
              | select(.name | test("debug"; "i") | not)]
            | sort_by(.size) | last
            | "\(.name)\t\(.browser_download_url)"')
          NAME=$(printf '%s' "$PICK" | cut -f1)
          URL=$(printf '%s' "$PICK" | cut -f2)
          if [ -z "$NAME" ] || [ "$NAME" = "null" ]; then
            echo "::error::No MicroG-RE .apk asset found in latest release." && exit 1
          fi
          echo "Downloading MicroG-RE: $NAME"
          curl -fSL -o "$NAME" "$URL"
          echo "MICROG_FILE=$NAME" >> "$GITHUB_ENV"
          ls -lh "$NAME"

      - name: Detect compatible YouTube version
        if: steps.gate.outputs.build == 'true'
        run: |
          java -jar morphe-cli.jar list-versions --patches="$PATCHES_FILE" 2>&1 | tee versions.txt
          BEST=$(awk '
            /^Package name: com\.google\.android\.youtube[[:space:]]*$/ {cap=1; next}
            /^Package name:/ {cap=0}
            cap {print}
          ' versions.txt | grep -oP '\d+\.\d+\.\d+' | head -1)
          if [ -z "$BEST" ]; then
            echo "::error::Could not detect compatible YouTube version." && exit 1
          fi
          echo "Compatible YouTube version: $BEST"
          echo "YT_VERSION=$BEST" >> "$GITHUB_ENV"

      - name: Download YouTube APK (APKMirror)
        if: steps.gate.outputs.build == 'true'
        run: |
          # Pull YouTube from APKMirror instead of an APKPure split bundle.
          # APKPure's XAPK, after merging, produced an app that force-closed
          # instantly on launch; APKMirror's bundle is what the Morphe/ReVanced
          # ecosystem builds against. morphe-cli merges the downloaded .apkm.
          npm install -g apkmirror-downloader@latest
          # apkmirror-downloader 2.0.10's bin has no `#!/usr/bin/env node`
          # shebang, so calling `apkmd` directly makes the shell try to execute
          # JavaScript ("syntax error"). Invoke it through node explicitly.
          APKMD="$(npm root -g)/apkmirror-downloader/dist/cli.js"
          mkdir -p yt-dl
          # Modern YouTube on APKMirror ships only as a BUNDLE (no standalone
          # APK), so request type=bundle. arch=arm64-v8a matches the arm64
          # bundle (the tool falls back to universal if that arch isn't listed).
          jq -n --arg v "$YT_VERSION" \
            '{options:{outDir:"yt-dl",arch:"arm64-v8a",dpi:"nodpi"},
              apps:[{org:"google-inc",repo:"youtube",version:$v,type:"bundle"}]}' > apps.json
          echo "Downloading YouTube ${YT_VERSION} from APKMirror..."
          # The tool exits 0 even when it finds nothing, and APKMirror sometimes
          # serves a Cloudflare challenge to CI IPs, so retry until a file lands.
          YT_FILE=""
          n=0
          while [ -z "$YT_FILE" ]; do
            node "$APKMD" apps.json || true
            YT_FILE=$(find yt-dl -type f \( -name '*.apkm' -o -name '*.xapk' -o -name '*.apks' -o -name '*.apk' \) | head -1)
            [ -n "$YT_FILE" ] && break
            n=$((n+1))
            if [ "$n" -ge 4 ]; then
              echo "::error::YouTube ${YT_VERSION} not downloaded from APKMirror after $n attempts." && exit 1
            fi
            echo "Download attempt $n produced no file — retrying in $((n*15))s..."
            sleep $((n*15))
          done
          echo "Downloaded: $YT_FILE"
          echo "YT_APK=$YT_FILE" >> "$GITHUB_ENV"

      - name: Setup keystore
        if: steps.gate.outputs.build == 'true'
        env:
          KEYSTORE_B64: ${{ secrets.MORPHE_KEYSTORE_BASE64 }}
          SECRET_PASS: ${{ secrets.MORPHE_KEYSTORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > morphe.keystore
            echo "KS_PASS=${SECRET_PASS:-morphe123}" >> "$GITHUB_ENV"
          else
            echo "::warning::Generating BKS keystore — save keystore.b64.txt as MORPHE_KEYSTORE_BASE64 secret."
            curl -fsSL -o bcprov.jar \
              "https://repo1.maven.org/maven2/org/bouncycastle/bcprov-jdk15on/1.70/bcprov-jdk15on-1.70.jar"
            keytool -genkey -v \
              -keystore morphe.keystore -storetype BKS \
              -provider org.bouncycastle.jce.provider.BouncyCastleProvider \
              -providerpath bcprov.jar \
              -alias Key -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass morphe123 -keypass morphe123 \
              -dname "CN=MorpheYT, O=MorpheYT, C=US" -noprompt
            base64 morphe.keystore > keystore.b64.txt
            echo "KS_PASS=morphe123" >> "$GITHUB_ENV"
          fi

      - name: Patch YouTube
        if: steps.gate.outputs.build == 'true'
        run: |
          OUTPUT="YoutubeM-${YT_VERSION}.apk"

          # Explicitly enable the patches listed in patch-config.json (additive —
          # all default patches still apply). This guarantees the critical
          # "GmsCore support" patch is on: without it the patched app cannot
          # reach MicroG and force-closes on launch. -e fails loudly if a name
          # no longer exists upstream, surfacing patch renames instead of
          # silently shipping a broken build.
          if [ "${{ github.event.inputs.safe_mode }}" = "true" ]; then
            # Diagnostic build: ONLY "GmsCore support" (+ its dependencies).
            # --exclusive disables every other patch. If this build launches but
            # the full build force-closes, a non-essential patch is the cause.
            PATCH_ARGS=(--exclusive -e "GmsCore support")
            echo "SAFE MODE: minimal patch set (GmsCore support + dependencies only)"
          else
            PATCH_ARGS=()
            while IFS= read -r name; do
              [ -n "$name" ] && PATCH_ARGS+=(-e "$name")
            done < <(jq -r '.[].patchName' .github/workflows/patch-config.json)
          fi
          echo "Enabling patches: ${PATCH_ARGS[*]}"

          # NOTE: --continue-on-error was removed deliberately. With it, a failed
          # GmsCore/critical patch was swallowed and a force-closing APK shipped.
          # Any patch failure must now abort the build (pipefail is on by default).
          java -jar morphe-cli.jar patch \
            --patches="$PATCHES_FILE" \
            "${PATCH_ARGS[@]}" \
            --keystore=morphe.keystore \
            --keystore-entry-alias=Key \
            --keystore-entry-password="$KS_PASS" \
            --keystore-password="$KS_PASS" \
            --temporary-files-path=/tmp/morphe/ \
            --out="$OUTPUT" \
            --striplibs="$ARCH" \
            --purge \
            "$YT_APK" 2>&1 | tee patch.log

          # Sanity-check the output so we never publish a truncated/broken APK.
          if [ ! -f "$OUTPUT" ]; then
            echo "::error::Patched APK was not produced." && exit 1
          fi
          SIZE=$(stat -c%s "$OUTPUT")
          echo "Patched APK size: $SIZE bytes"
          if [ "$SIZE" -lt 10000000 ]; then
            echo "::error::Patched APK is suspiciously small ($SIZE bytes) — likely broken." && exit 1
          fi
          echo "OUTPUT_APK=$OUTPUT" >> "$GITHUB_ENV"

      - name: Upload artifact
        if: steps.gate.outputs.build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: YoutubeM-${{ env.YT_VERSION }}-${{ steps.versions.outputs.patches_tag }}
          path: |
            YoutubeM-*.apk
            *.apk
            keystore.b64.txt
          retention-days: 14

      - name: Create GitHub Release
        if: steps.gate.outputs.build == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="yt-${YT_VERSION}-${{ steps.versions.outputs.patches_tag }}"
          gh release create "$TAG" \
            --title "YoutubeM-${YT_VERSION}" \
            --notes "## Reworked YouTube ${YT_VERSION}

          This is a reworked YouTube version **${YT_VERSION}** patched with Morphe.

          ---

          ### 📦 Files in this release

          | File | Purpose |
          |------|---------|
          | \`YoutubeM-${YT_VERSION}.apk\` | Patched YouTube — install this |
          | \`${{ env.MICROG_FILE }}\` | MicroG-RE (required — prevents force close) |

          ---

          ### ⚙️ Setup — first time

          > Follow these steps **in order**. Skipping MicroG-RE is the #1 cause of force close.

          1. **Uninstall stock YouTube** from your phone (Play Store version uses Google's signature — it blocks this APK)
          2. **Install MicroG-RE** (\`${{ env.MICROG_FILE }}\`) first
          3. **Install YoutubeM** (\`YoutubeM-${YT_VERSION}.apk\`)
          4. Open YoutubeM — sign in with your Google account when prompted

          ### 🔄 Updating later

          When a new release appears here, just install the new \`YoutubeM-*.apk\` directly over the old one — no uninstall needed, as long as you always use APKs from this repo (same signing key).
          Update MicroG-RE the same way if its version changed.

          ---

          ### 🔧 Versions
          - YouTube base: \`${YT_VERSION}\`
          - morphe-patches: \`${{ steps.versions.outputs.patches_tag }}\`
          - morphe-cli: \`${{ steps.versions.outputs.cli_tag }}\`
          - MicroG-RE: \`${{ steps.versions.outputs.microg_tag }}\`" \
            "$OUTPUT_APK" "$MICROG_FILE" && { echo "Release $TAG created."; exit 0; }
          # Creation failed — only tolerate the "tag already exists" case.
          # Previously every failure was swallowed, which is why the repo had
          # zero published releases despite successful builds.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::notice::Release $TAG already exists — skipping."
          else
            echo "::error::Failed to create release $TAG." && exit 1
          fi

      - name: Save build cache
        if: steps.gate.outputs.build == 'true'
        uses: actions/cache/save@v4
        with:
          path: .build-cache
          key: yt-morphe-${{ steps.versions.outputs.cli_tag }}-${{ steps.versions.outputs.patches_tag }}

      - name: Create cache placeholder
        if: steps.gate.outputs.build == 'true'
        run: mkdir -p .build-cache && echo "built" > .build-cache/stamp
