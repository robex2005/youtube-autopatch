name: Patch YouTube with Morphe

on:
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if versions unchanged'
        type: boolean
        default: false
      youtube_version:
        description: 'YouTube version to patch (empty = use YT_DEFAULT_VERSION below)'
        required: false
        default: ''
  schedule:
    - cron: '0 6 * * *'   # Daily 06:00 UTC — detects new morphe-patches releases within 24 h

permissions:
  contents: write

env:
  YT_PACKAGE: com.google.android.youtube
  # Update this when morphe-patches drops support for the current version.
  # Compatible versions are listed at: https://github.com/MorpheApp/morphe-patches/releases
  YT_DEFAULT_VERSION: '19.47.53'
  # Keep only this ABI in the patched APK (arm64-v8a suits most modern phones)
  ARCH: arm64-v8a

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Version discovery ──────────────────────────────────────────────────

      - name: Get latest morphe-cli / morphe-patches versions
        id: versions
        run: |
          CLI_TAG=$(curl -sf "https://api.github.com/repos/MorpheApp/morphe-cli/releases/latest" \
            | jq -r '.tag_name')
          PATCHES_TAG=$(curl -sf "https://api.github.com/repos/MorpheApp/morphe-patches/releases/latest" \
            | jq -r '.tag_name')
          echo "cli_tag=$CLI_TAG"         >> "$GITHUB_OUTPUT"
          echo "patches_tag=$PATCHES_TAG" >> "$GITHUB_OUTPUT"
          echo "morphe-cli: $CLI_TAG  |  morphe-patches: $PATCHES_TAG"

      - name: Restore build cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: .build-cache
          key: yt-morphe-${{ steps.versions.outputs.cli_tag }}-${{ steps.versions.outputs.patches_tag }}

      - name: Decide whether to build
        id: gate
        run: |
          if [ "${{ steps.cache.outputs.cache-hit }}" = "true" ] \
          && [ "${{ github.event.inputs.force_rebuild }}" != "true" ]; then
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "Already built for cli=${{ steps.versions.outputs.cli_tag }} patches=${{ steps.versions.outputs.patches_tag }} — skipping."
          else
            echo "build=true" >> "$GITHUB_OUTPUT"
          fi

      # ── Tool downloads ─────────────────────────────────────────────────────


      - name: Install apkeep
        if: steps.gate.outputs.build == 'true'
        run: |
          RELEASE=$(curl -sf "https://api.github.com/repos/EFForg/apkeep/releases/latest")
          URL=$(echo "$RELEASE" | jq -r \
            '.assets[] | select(.name | test("x86_64.*linux.*gnu")) | .browser_download_url' | head -1)
          echo "apkeep URL: $URL"
          curl -fSL -o apkeep "$URL"
          chmod +x apkeep
          ./apkeep --version

      # ── YouTube APK ────────────────────────────────────────────────────────

      - name: Resolve YouTube version
        if: steps.gate.outputs.build == 'true'
        id: yt
        run: |
          INPUT="${{ github.event.inputs.youtube_version }}"
          VER="${INPUT:-$YT_DEFAULT_VERSION}"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "YouTube target version: $VER"

      - name: Download YouTube APK
        if: steps.gate.outputs.build == 'true'
        run: |
          ./apkeep -a "$YT_PACKAGE" -d APKPure .
          YT_FILE=$(ls "${YT_PACKAGE}"*.apk "${YT_PACKAGE}"*.xapk 2>/dev/null \
                 || ls YouTube*.apk YouTube*.xapk 2>/dev/null \
                 || ls *.apk *.xapk 2>/dev/null | head -1)
          if [ -z "$YT_FILE" ]; then
            echo "ERROR: YouTube APK was not downloaded." && exit 1
          fi
          echo "YT_APK=$YT_FILE" >> "$GITHUB_ENV"
          echo "Downloaded: $YT_FILE"

      # ── Keystore ───────────────────────────────────────────────────────────

      - name: Setup keystore
        if: steps.gate.outputs.build == 'true'
        env:
          KEYSTORE_B64: ${{ secrets.MORPHE_KEYSTORE_BASE64 }}
          SECRET_PASS: ${{ secrets.MORPHE_KEYSTORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > morphe.keystore
            echo "KS_PASS=${SECRET_PASS:-morphe123}" >> "$GITHUB_ENV"
            echo "Keystore restored from secret."
          else
            echo "::warning::MORPHE_KEYSTORE_BASE64 secret not set — generating a one-time keystore."
            echo "::warning::Save keystore.b64.txt (uploaded as artifact) as the MORPHE_KEYSTORE_BASE64 secret so re-installs don't require uninstalling the app first."
            keytool -genkey -v \
              -keystore morphe.keystore \
              -alias Key \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -storepass morphe123 -keypass morphe123 \
              -dname "CN=MorpheYT, O=MorpheYT, C=US" \
              -noprompt
            base64 morphe.keystore > keystore.b64.txt
            echo "KS_PASS=morphe123" >> "$GITHUB_ENV"
          fi

      # ── Patching ───────────────────────────────────────────────────────────

      - name: Patch YouTube
        if: steps.gate.outputs.build == 'true'
        run: |
          OUTPUT="youtube-patched-${{ steps.yt.outputs.version }}.apk"
          OPTS_FLAG=""
          if [ -f patch-config.json ]; then
            OPTS_FLAG="--options-file=patch-config.json"
          fi

          java -jar morphe-cli.jar \
            --patches=MorpheApp/morphe-patches \
            --keystore=morphe.keystore \
            --keystore-entry-alias=Key \
            --keystore-entry-password="$KS_PASS" \
            --keystore-password="$KS_PASS" \
            --temporary-files-path=/tmp/morphe/ \
            --out="$OUTPUT" \
            --striplibs="$ARCH" \
            --continue-on-error \
            --purge \
            $OPTS_FLAG \
            "$YT_APK"

          echo "OUTPUT_APK=$OUTPUT" >> "$GITHUB_ENV"

      # ── Publish ────────────────────────────────────────────────────────────

      - name: Upload artifact
        if: steps.gate.outputs.build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: youtube-patched-${{ steps.yt.outputs.version }}-${{ steps.versions.outputs.patches_tag }}
          path: |
            youtube-patched-*.apk
            keystore.b64.txt
          retention-days: 14

      - name: Create GitHub Release
        if: steps.gate.outputs.build == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="yt-${{ steps.yt.outputs.version }}-${{ steps.versions.outputs.patches_tag }}"
          gh release create "$TAG" \
            --title "YouTube ${{ steps.yt.outputs.version }} — morphe-patches ${{ steps.versions.outputs.patches_tag }}" \
            --notes "**YouTube:** ${{ steps.yt.outputs.version }}
          **morphe-cli:** [${{ steps.versions.outputs.cli_tag }}](https://github.com/MorpheApp/morphe-cli/releases/tag/${{ steps.versions.outputs.cli_tag }})
          **morphe-patches:** [${{ steps.versions.outputs.patches_tag }}](https://github.com/MorpheApp/morphe-patches/releases/tag/${{ steps.versions.outputs.patches_tag }})
          **Architecture:** ${{ env.ARCH }}

          Install this APK directly on your phone. If you previously installed a build from this repo, you can update without uninstalling — as long as the keystore is the same." \
            "$OUTPUT_APK" \
          || echo "::notice::Release $TAG already exists — skipping release creation."

      # ── Cache bookkeeping ──────────────────────────────────────────────────

      - name: Save build cache
        if: steps.gate.outputs.build == 'true'
        uses: actions/cache/save@v4
        with:
          path: .build-cache
          key: yt-morphe-${{ steps.versions.outputs.cli_tag }}-${{ steps.versions.outputs.patches_tag }}

      - name: Create cache placeholder
        if: steps.gate.outputs.build == 'true'
        run: mkdir -p .build-cache && echo "built" > .build-cache/stamp
